version: 2
updates:
- package-ecosystem: pip
  directory: /requirements
  schedule:
    interval: weekly
    day: monday
    time: 09:00
  open-pull-requests-limit: 10
  reviewers:
  - DataDog/flask-realworld-maintainers
  labels:
  - dependencies
  - python
  commit-message:
    prefix: chore(deps)
    include: scope
  cooldown:
    default-days: 14
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 09:00
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - ci
  commit-message:
    prefix: chore(ci)
  cooldown:
    default-days: 14
